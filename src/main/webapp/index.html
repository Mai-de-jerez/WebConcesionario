<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | Concesionario May</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-body"> 
	<nav class="navbar">
	    <div class="nav-left">
	        <a href="index.html" class="nav-link">Inicio</a>
	        <a href="tienda.html" class="nav-link">Tienda</a>
	        <a href="sobre-nosotros.html" class="nav-link">Sobre Nosotros</a>
	        <a href="contacto.html" class="nav-link">Contacto</a>
	    </div>
	    <div class="nav-right" id="nav-sesion">
	        </div>        
	</nav>
	
	<script src="js/nav-session.js"></script>
    <main class="content-area">
        <section class="hero">
            <h1>Bienvenida al Concesionario May</h1>
            <p>Encuentra el coche de tus sueños con la mejor financiación.</p>
        </section>

        <div class="container">
        	<h1>🚗 Novedades de la semana</h1>      	
        	<div class="welcome-section">
		         <p>Estas son nuestras mejores propuestas.</p>
	        </div>  
            <div class="feature-cards"></div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Concesionario May. Todos los derechos reservados.</p>
    </footer>
    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", async () => {

            const contenedor = document.querySelector(".feature-cards");

            try {
                const res = await fetch('Tienda_Sv?accion=novedades');
                
                if (res.ok) {
                    const coches = await res.json();
                  
                    contenedor.innerHTML = "";

                    if (!coches || coches.length === 0) {
                        contenedor.innerHTML = "<p>No hay coches nuevos esta semana. ¡Vuelve pronto!</p>";
                        return;
                    }

                    coches.forEach(c => {
                        const card = document.createElement("div");
                        card.className = "feature-card"; 
                        card.style.cursor = "pointer";
                   
                        card.onclick = () => {
                            location.href = `detalle_coche_tienda.html?id=${c.id}`;
                        };

                        card.innerHTML = `
                            <h3>${c.marca} ${c.modelo}</h3>
                            <p>"${c.descripcion || 'Sin descripción.'}"</p>
                        `;

                        contenedor.appendChild(card);
                    });
                } else {
                    contenedor.innerHTML = "<p>No se han podido cargar las novedades.</p>";
                }
            } catch (err) {
                console.error("Error:", err);
                contenedor.innerHTML = "<p>Error de conexión.</p>";
            }
        });
    </script>
</body>
</html>
