<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestión de Vehículos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container login-container">
        <h1 id="tituloLogin">🔐 Iniciar Sesión</h1>
       		
        <div id="error-container" style="display: none; color: white; background-color: #d9534f; padding: 10px; border-radius: 5px; margin-bottom: 20px; text-align: center;">
        </div>

        <form id="loginForm" action="Login" method="POST">
        
            <div class="form-group">
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" name="usuario" required placeholder="Ingrese su usuario">
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña">
            </div>
            
            <div class="form-register">
                <span>¿No tienes cuenta?</span>
                <a href="alta-usuario.html">Regístrate aquí</a>
            </div>
            <div class="form-register">
		        <a href="olvido-password.html">¿Has olvidado tu contraseña?</a>
		    </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Ingresar</button>
        </form>

        <a href="index.html" class="btn btn-back" style="width: 100%; display: block; margin-top: 15px;">Volver al Inicio</a>
    </div>
    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("loginForm");
            const errorDiv = document.getElementById("error-container");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                errorDiv.style.display = "none";

                const datos = new URLSearchParams(new FormData(form));

                try {
                    const res = await fetch('Login', {
                        method: 'POST',
                        body: datos
                    });

                    if (res.ok) {
                        const respuesta = await res.json(); 
                        
                        // Accedemos directamente al nivel mapeado en el Servlet
                        const nivel = respuesta.nivel;

                        if (nivel !== undefined && nivel <= 2) {
                        	window.location.href = "admin?vista=panel";
                        } else {
                            window.location.href = "index.html";
                        }
                    } else {
                        errorDiv.textContent = "Usuario o contraseña incorrectos.";
                        errorDiv.style.display = "block";
                    }
                } catch (err) {
                    errorDiv.textContent = "Error al conectar con el servidor.";
                    errorDiv.style.display = "block";
                }
            });
        });
    </script>
</body>
</html>
