<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestión de Vehículos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container login-container">
        <h1 id="tituloLogin">🔐 Iniciar Sesión</h1>
       	<div id="notificacion" class="message" style="display:none"></div>


        <form id="loginForm" action="Login" method="POST">
        
            <div class="form-group">
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" name="usuario" required placeholder="Ingrese su usuario">
                <span id="error-usuario" class="mensaje-error-campo"></span> 
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña">
                <span id="error-password" class="mensaje-error-campo"></span> 
            </div>
            
            <div class="form-register">
                <span>¿No tienes cuenta?</span>
                <a href="alta-usuario.html">Regístrate aquí</a>
            </div>
            <div class="form-register">
		        <a href="olvido-password.html">¿Has olvidado tu contraseña?</a>
		    </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Ingresar</button>
        </form>

        <a href="index.html" class="btn btn-back" style="width: 100%; display: block; margin-top: 15px;">Volver al Inicio</a>
    </div>   
    <script src=js/utils.js></script> 
    <script src=js/validaciones.js></script>
    <script type="text/javascript">
    
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("loginForm");       
            const params = new URLSearchParams(window.location.search);
            const idRegreso = params.get("idRegreso");
            const errorSesion = params.get("error");
            
            configurarLimpiezaErrores("#loginForm");

            if (errorSesion === "nosesion") {
                mostrarMensaje("Debes iniciar sesión para realizar una reserva.", "error");
            }

            form.addEventListener("submit", async (e) => {

                e.preventDefault();
                
                if (!validarFormularioLogin()) {
                    return; 
                }

                const datos = new URLSearchParams(new FormData(form));

                try {
                    const res = await fetch('Login', {
                        method: 'POST',
                        body: datos
                    });

                    if (res.ok) {
                        const respuesta = await res.json(); 
                        sessionStorage.clear();
  
                        const nivel = respuesta.nivel;

                        if (idRegreso) {
                            window.location.href = `Tienda_Sv?accion=checkout&idCoche=${idRegreso}`;
                        } 
                 
                        else if (nivel !== undefined && nivel <= 2) {
                            window.location.href = "admin?vista=panel";
                        } 
         
                        else {
                            window.location.href = "index.html";
                        }
                    } else {           
                    	setError("Usuario o contraseña incorrectos.");
                    }
      
	            } catch (err) {
	                setError("Error al conectar con el servidor.");
	            }
                
                
            });
        });
    </script>
</body>
</html>
