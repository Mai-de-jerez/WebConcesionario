<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperación de Contraseña - Concesionario May</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container login-container">
        
        <div id="seccion-solicitar">
            <h1 style="color: #764ba2; text-align: center;">¿Olvidaste tu clave?</h1>
            <p style="text-align: center; margin-bottom: 20px;">Introduce tu email para enviarte un enlace de recuperación.</p>
            
            <form id="form-solicitar">
                <div class="form-group">
                    <label for="emailRecuperar">Introduce tu email:</label>
                    <input type="email" id="emailRecuperar" name="email" required placeholder="tu@email.com" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Generar enlace</button>
            </form>
        </div>

        <div id="seccion-restablecer" style="display: none;">
            <h1 style="color: #764ba2; text-align: center;">Nueva Contraseña</h1>
            <p style="text-align: center; margin-bottom: 20px;">Crea una contraseña segura para tu cuenta.</p>
            
            <form id="form-restablecer">
                <input type="hidden" id="token-hidden" name="token">
                
                <div class="form-group">
                    <label for="pass1">Nueva contraseña:</label>
                    <input type="password" id="pass1" name="pass1" required placeholder="Escribe tu nueva clave" class="form-control">
                </div>

                <div class="form-group">
                    <label for="pass2">Confirmar contraseña:</label>
                    <input type="password" id="pass2" name="pass2" required placeholder="Repite la clave" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    Actualizar Contraseña
                </button>
            </form>
        </div>

        <div id="feedback" style="display: none; padding: 15px; border-radius: 5px; margin-top: 20px; text-align: center;"></div>

        <a href="login.html" class="btn btn-back" style="width: 100%; display: block; margin-top: 15px; text-align: center; text-decoration: none;">
            Volver al Login
        </a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const feedback = document.getElementById("feedback");

            // LÓGICA DE VISTA: Si hay token en la URL, mostramos el formulario de "Nueva Pass"
            if (token) {
                document.getElementById("seccion-solicitar").style.display = "none";
                document.getElementById("seccion-restablecer").style.display = "block";
                document.getElementById("token-hidden").value = token;
            }

            // ACCIÓN 1: Enviar email de recuperación
            document.getElementById("form-solicitar").addEventListener("submit", async (e) => {
                e.preventDefault();
                const formData = new URLSearchParams(new FormData(e.target));
                formData.append("accion", "solicitar");

                try {
                    const resp = await fetch("OlvidoPasswordServlet", { method: "POST", body: formData });
                    const data = await resp.json();
                    
                    feedback.style.display = "block";
                    feedback.style.backgroundColor = data.resultado === "OK" ? "#28a745" : "#dc3545";
                    feedback.style.color = "white";
                    feedback.textContent = data.mensaje;
                    
                    if(data.resultado === "OK") e.target.reset();
                } catch (err) {
                    console.error(err);
                }
            });

            // ACCIÓN 2: Cambiar la contraseña
            document.getElementById("form-restablecer").addEventListener("submit", async (e) => {
                e.preventDefault();
                const formData = new URLSearchParams(new FormData(e.target));
                formData.append("accion", "cambiar");

                try {
                    const resp = await fetch("OlvidoPasswordServlet", { method: "POST", body: formData });
                    const data = await resp.json();
                    
                    feedback.style.display = "block";
                    feedback.style.backgroundColor = data.resultado === "OK" ? "#28a745" : "#dc3545";
                    feedback.style.color = "white";
                    feedback.textContent = data.mensaje;

                    if(data.resultado === "OK") {
                        setTimeout(() => window.location.href = "login.html", 3000);
                    }
                } catch (err) {
                    console.error(err);
                }
            });
        });
    </script>
</body>
</html>
