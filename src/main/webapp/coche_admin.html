<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Vehículos - Concesionario May</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
	<div id="mensaje-error" style="display: none;"></div>
	
    <div class="header-actions">
        <h1>🚗 Lista de Vehículos</h1>
        <div id="notificacion" class="message" style="display:none"></div>
        <a href="form-vehiculo.html" class="btn btn-success">➕ Nuevo Vehículo</a>
    </div>
	
	
    <div class="search-form">
        <input type="text" id="inputBusqueda" placeholder="Marca, modelo, matrícula...">
        <button id="btnLimpiar" class="btn btn-secondary" style="display:none">Limpiar</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Matrícula</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Año</th>
                    <th>Color</th>
                    <th>KM</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                </tbody>
        </table>
    </div>

    <div id="paginacion" class="paginacion-container"></div>

    <div class="nav-buttons">
        <a href="admin-panel.html" class="btn btn-back">Volver al Panel</a>
    </div>
</div>
<script src="js/utils.js"></script> 
<script>
let estado = {
	    pagina: 1,
	    busqueda: ""
	};

	document.addEventListener("DOMContentLoaded", () => {
	    cargarCoches();

	    // Búsqueda con debounce para no saturar el servidor
	    let timer;
	    document.getElementById("inputBusqueda").addEventListener("input", (e) => {
	        clearTimeout(timer);
	        estado.busqueda = e.target.value;
	        estado.pagina = 1;
	        
	        document.getElementById("btnLimpiar").style.display = estado.busqueda ? "inline-block" : "none";
	        
	        timer = setTimeout(cargarCoches, 400);
	    });

	    document.getElementById("btnLimpiar").onclick = () => {
	        document.getElementById("inputBusqueda").value = "";
	        estado.busqueda = "";
	        document.getElementById("btnLimpiar").style.display = "none";
	        cargarCoches();
	    };
	});

	async function cargarCoches() {
	    try {
	        const res = await fetch(`Coche_Sv?accion=listar&pagina=${estado.pagina}&busqueda=${encodeURIComponent(estado.busqueda)}`);
	        
	        // Si el Servlet dice que no estás logueada (401 o 403), a la calle
	        if (res.status === 401 || res.status === 403) {
	            window.location.href = "login.html";
	            return;
	        }

	        const data = await res.json();
	        renderTabla(data.coches);
	        renderPaginacion(data.totalPaginas);
	    } catch (err) {
	    	mostrarMensaje("Error al conectar con el servidor", "error");
	    }
	}

	function renderTabla(coches) {
	    const tbody = document.getElementById("cuerpoTabla");
	    if (!coches || coches.length === 0) {
	        tbody.innerHTML = '<tr><td colspan="8" class="text-center">No se encontraron vehículos.</td></tr>';
	        return;
	    }

	    tbody.innerHTML = coches.map(c => `
	        <tr>
	            <td style="font-weight: bold; color: #764ba2;">${c.id}</td>
	            <td><strong>${c.matricula}</strong></td>
	            <td>${c.marca}</td>
	            <td>${c.modelo}</td>
	            <td>${c.anio}</td>
	            <td>${c.color || '-'}</td>
	            <td>${c.km.toLocaleString()}</td>
	            <td class="actions">
	            <a href="detalle_coche.html?id=${c.id}&admin=true" class="row-btn btn-success btn-small">Ver más</a>
	         
	                   
	                <a href="form-vehiculo.html?id=${c.id}" class="row-btn btn-primary btn-small">Editar</a>
	                
                    <a href="#" class="row-btn btn-secondary btn-small" 
                       onclick="event.preventDefault(); if(confirm('¿Estás seguro de querer eliminar este vehículo?')) eliminar(${c.id})">Eliminar</a>

	            </td>
	        </tr>
	    `).join("");
	}
	
	function renderPaginacion(total) {
	    const pContainer = document.getElementById("paginacion");
	    
	    // Si no hay páginas o solo hay una, no pintamos nada (como en tu JSP)
	    if (!total || total <= 1) { 
	        pContainer.innerHTML = ""; 
	        return; 
	    }

	    let html = "";

	    // Botón Anterior (solo si no estamos en la página 1)
	    if (estado.pagina > 1) {
	        html += `<a href="#" class="btn btn-secondary" 
	                    onclick="event.preventDefault(); cambiarPagina(${estado.pagina - 1})">← Anterior</a>`;
	    }

	    // Números de página
	    for (let i = 1; i <= total; i++) {
	        // Si es la página actual, le metemos 'btn-primary', si no 'btn-secondary'
	        const claseColor = (i === estado.pagina) ? 'btn-primary' : 'btn-secondary';
	        
	        html += `<a href="#" class="btn ${claseColor}" 
	                    onclick="event.preventDefault(); cambiarPagina(${i})">${i}</a>`;
	    }

	    // Botón Siguiente (solo si no estamos en la última página)
	    if (estado.pagina < total) {
	        html += `<a href="#" class="btn btn-secondary" 
	                    onclick="event.preventDefault(); cambiarPagina(${estado.pagina + 1})">Siguiente →</a>`;
	    }

	    pContainer.innerHTML = html;
	}

	function cambiarPagina(n) {
	    estado.pagina = n;
	    cargarCoches();
	}

	async function eliminar(id) {
	    if (!confirm("¿Seguro que quieres borrar este coche?")) return;
	    
	    const res = await fetch(`Coche_Sv?accion=eliminar&id=${id}`, { method: 'GET' });
	    const data = await res.json();
	    
	    if (data.resultado === "OK") {
	        cargarCoches(); // Recargamos la lista sin refrescar la página
	    } else {
	        mostrarMensaje("No se pudo eliminar el coche", "error");
	    }
	}
</script>
</body>
</html>
