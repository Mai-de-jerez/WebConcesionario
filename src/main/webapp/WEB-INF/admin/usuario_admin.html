<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Concesionario May</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">

    <div id="modalConfirmar" class="modal-simple" style="display:none;">
        <div class="modal-contenido">
            <h3>⚠️ ¿Eliminar usuario?</h3>
            <p>Esta acción no se puede deshacer.</p>
            <div class="modal-btns">
                <button id="btnConfirmarBorrar" class="btn btn-danger">Sí, borrar</button>
                <button onclick="cerrarModal()" class="btn btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="header-actions">
        <h1>👤 Lista de Usuarios</h1>
        <div id="notificacion" class="message" style="display:none"></div>
        <a href="admin?vista=form-usuario" class="btn btn-success">➕ Nuevo Usuario</a>
    </div>

    <div class="search-form">
        <input type="text" id="inputBusqueda" placeholder="Nombre, usuario, email...">
        <button id="btnLimpiar" class="btn btn-secondary" style="display:none">Limpiar</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Nivel</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>

    <div class="paginacion-container">
        <button type="button" id="pag-anterior" class="btn-ver">Anterior</button>
        <span id="num-pagina">Página 1</span>
        <button type="button" id="pag-siguiente" class="btn-ver">Siguiente</button>
    </div>

    <div class="nav-buttons">
        <a href="admin?vista=panel" class="btn btn-back">Volver al Panel</a>
    </div>
</div>

<script src="js/utils.js"></script>
<script type="text/javascript">
    let estado = { pagina: 1, busqueda: "" };
    let idSeleccionadoParaBorrar = null;
    let nivelAdmin = null;
    let idUsuarioLogueado = null;

    document.addEventListener("DOMContentLoaded", async () => {

        const resUser = await fetch('Login');
        if (resUser.ok) {
            const datos = await resUser.json();
            nivelAdmin = datos.nivel;
            idUsuarioLogueado = datos.id_usuario;

        }

        const estadoGuardado = sessionStorage.getItem("estado_gestion_usuarios");
        if (estadoGuardado) {
            const recuperado = JSON.parse(estadoGuardado);
            estado.pagina = recuperado.pagina;
            estado.busqueda = recuperado.busqueda;
            document.getElementById("inputBusqueda").value = estado.busqueda;
            if (estado.busqueda) document.getElementById("btnLimpiar").style.display = "inline-block";
        }

        cargarUsuarios();

        document.getElementById("cuerpoTabla").addEventListener("click", (e) => {
            const link = e.target.closest(".link-borrar");
            if (link) {
                e.preventDefault();
                abrirModalBorrado(link.getAttribute("data-id"));
            }
        });

        document.getElementById("btnConfirmarBorrar").onclick = ejecutarEliminacion;


        let timer;
        document.getElementById("inputBusqueda").addEventListener("input", (e) => {
            clearTimeout(timer);
            estado.busqueda = e.target.value;
            estado.pagina = 1;
            document.getElementById("btnLimpiar").style.display = estado.busqueda ? "inline-block" : "none";
            sessionStorage.setItem("estado_gestion_usuarios", JSON.stringify(estado));
            timer = setTimeout(cargarUsuarios, 400);
        });

        document.getElementById("btnLimpiar").onclick = () => {
            document.getElementById("inputBusqueda").value = "";
            estado.busqueda = "";
            estado.pagina = 1;
            document.getElementById("btnLimpiar").style.display = "none";
            sessionStorage.setItem("estado_gestion_usuarios", JSON.stringify(estado));
            cargarUsuarios();
        };
    });

    async function cargarUsuarios() {
        setLoading(6);
        try {
            const res = await fetch(`Usuario_Sv?accion=listar&pagina=${estado.pagina}&busqueda=${encodeURIComponent(estado.busqueda)}`);

            if (res.status === 401 || res.status === 403) {
                window.location.href = "login.html";
                return;
            }

            const data = await res.json();

            if (!data.usuarios || data.usuarios.length === 0) {
                setVacio("No hay usuarios con ese filtro", 6);
                renderPaginacion(0);
                return;
            }

            renderTabla(data.usuarios);
            renderPaginacion(data.totalPaginas);
            sessionStorage.setItem("estado_gestion_usuarios", JSON.stringify(estado));

        } catch (err) {
            setError("Error al conectar con el servidor");
        }
    }

    function renderTabla(usuarios) {
        const tbody = document.getElementById("cuerpoTabla");
        tbody.innerHTML = usuarios.map(u => {
            const soyYo = (u.id_usuario === idUsuarioLogueado);
            const puedeborrar = (nivelAdmin === 1 && !soyYo);            

            const btnBorrar = puedeborrar 
                ? `<a href="#" class="row-btn btn-secondary btn-small link-borrar" data-id="${u.id_usuario}">Eliminar</a>`
                : soyYo ? `<span title="No puedes borrarte a ti mismo">🔒 (Tú)</span>` : "";

            return `
                <tr>
                    <td style="font-weight: bold; color: #764ba2;">${u.id_usuario}</td>
                    <td><strong>${u.usuario}</strong></td>
                    <td>${u.email}</td>
                    <td>${u.rol}</td>
                    <td>${u.rol === 'SUPERUSER' ? 1 : u.rol === 'EMPLEADO' ? 2 : 3}</td>
                    <td class="actions">
                        <a href="admin?vista=detalle-usuario&id=${u.id_usuario}" class="row-btn btn-success btn-small">Ver más</a>
                        <a href="admin?vista=form-usuario&id=${u.id_usuario}" class="row-btn btn-primary btn-small">Editar</a>
                        ${btnBorrar}
                    </td>
                </tr>
            `;
        }).join("");
    }

    function renderPaginacion(total) {
        const btnAnt = document.getElementById("pag-anterior");
        const btnSig = document.getElementById("pag-siguiente");
        const info = document.getElementById("num-pagina");
        if (!info || !btnAnt || !btnSig) return;

        const container = document.querySelector(".paginacion-container");
        container.style.display = (total <= 1) ? "none" : "flex";
        info.textContent = `Página ${estado.pagina} de ${total || 1}`;
        btnAnt.disabled = (estado.pagina <= 1);
        btnSig.disabled = (estado.pagina >= total || total === 0);
        btnAnt.onclick = () => { if (estado.pagina > 1) cambiarPagina(estado.pagina - 1); };
        btnSig.onclick = () => { if (estado.pagina < total) cambiarPagina(estado.pagina + 1); };
    }

    function cambiarPagina(n) {
        estado.pagina = n;
        sessionStorage.setItem("estado_gestion_usuarios", JSON.stringify(estado));
        cargarUsuarios();
    }

    function abrirModalBorrado(id) {
        idSeleccionadoParaBorrar = id;
        document.getElementById("modalConfirmar").style.display = "flex";
    }

    function cerrarModal() {
        document.getElementById("modalConfirmar").style.display = "none";
        idSeleccionadoParaBorrar = null;
    }

    async function ejecutarEliminacion() {
        if (!idSeleccionadoParaBorrar) return;
        try {
            const res = await fetch(`Usuario_Sv?accion=eliminar&id=${idSeleccionadoParaBorrar}`, { method: 'GET' });
            const data = await res.json();
            if (data.resultado === "OK") {
                cerrarModal();
                mostrarMensaje("Usuario eliminado correctamente", "success");
                cargarUsuarios();
            } else {
                setError("Error: " + data.mensaje);
            }
        } catch (err) {
            setError("Error de red al intentar eliminar");
        } finally {
        	window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }
    
    document.querySelector('a[href="admin?vista=panel"]').addEventListener("click", () => {
        sessionStorage.removeItem("estado_gestion_usuarios");
    });
</script>
</body>
</html>
