<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Usuario - Sistema de Gestión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 id="tituloPagina">👤 Nuevo Usuario</h1>
        <div id="notificacion" class="message" style="display:none"></div>
        <form id="formUsuario" enctype="multipart/form-data" novalidate>
            <input type="hidden" id="idUsuario" name="id">
            <input type="hidden" id="foto_actual" name="foto_actual">
            <input type="hidden" id="accion-form" value="alta">

            <div class="form-grid">
                <div class="form-group">
                    <label for="usuario">Nombre de Usuario: *</label>
                    <input type="text" id="usuario" name="usuario" autocomplete="new-password" required placeholder="Ej: carmen_lucena">
                    <span id="error-usuario" class="mensaje-error-campo"></span>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico: *</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                    <span id="error-email" class="mensaje-error-campo"></span>
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Carmen">
                    <span id="error-nombre" class="mensaje-error-campo"></span>

                </div>

                <div class="form-group">
                    <label for="apellidos">Apellidos:</label>
                    <input type="text" id="apellidos" name="apellidos" placeholder="Ej: Lucena García">
                    <span id="error-apellidos" class="mensaje-error-campo"></span>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Ej: 600123456">
                    <span id="error-telefono" class="mensaje-error-campo"></span>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección:</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Calle, Número, Ciudad">
                    <span id="error-direccion" class="mensaje-error-campo"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña: *</label>
                    <input type="password" id="password" name="password" autocomplete="new-password" placeholder="Crea una clave segura">
                    <span id="error-password" class="mensaje-error-campo"></span>
                </div>

                <div class="form-group">
                    <label for="rol">Rol: *</label>
                    <select id="rol" name="rol" required>
                        <option value="">-- Selecciona Rol --</option>
                        <option value="CLIENTE">Cliente</option>
                        <option value="EMPLEADO">Empleado</option>
                        <option value="SUPERUSER">Superuser</option>
                    </select>
                    <span id="error-rol" class="mensaje-error-campo"></span>
                </div>                
         
            </div>
            
            <div class="form-group">
			    <label for="foto">Foto del usuario:</label>
			    <div id="previsualizacion"></div>
			    <input type="file" id="foto" name="foto" accept="image/*" style="display: block; width: 100%;">
			    <span id="error-foto" class="mensaje-error-campo"></span>
			    <small style="color: gray;">Formatos aceptados: JPG, PNG, WEBP</small>
			</div>

            <div class="form-buttons">
                <button type="submit" class="btn btn-success">💾 Guardar Usuario</button>
                <button type="reset" class="btn btn-secondary">🔄 Limpiar</button>
                <a href="admin?vista=usuarios" class="btn btn-back">❌ Cancelar</a>
            </div>
        </form>
    </div>
    <script src="js/utils.js"></script>
	<script src="js/validaciones.js"></script>
    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", async () => {
        	configurarLimpiezaErrores("#formUsuario");
        	           
            let miNivel = 99; 
            let miId = null;
            
            try {
                const resSesion = await fetch('Login');
                if (resSesion.ok) {
                    const yo = await resSesion.json();
                    miNivel = yo.nivel;  
                    miId = yo.id_usuario; 
                }
            } catch (e) { console.error("Error identificando sesión"); }
        	
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            const form = document.getElementById("formUsuario");
            const selectRol = document.getElementById("rol");

            
            if (id) {
                document.getElementById("tituloPagina").innerText = "✏️ Editar Usuario";
                document.getElementById("idUsuario").value = id;
                document.getElementById("password").placeholder = "Dejar vacío para no cambiar";
                document.getElementById("accion-form").value = "editar";
                await cargarDatosUsuario(id);
                
	            if (miNivel > 1 || (miNivel === 1 && id == miId)) {
	                selectRol.style.backgroundColor = "#e9ecef"; // Color gris de "bloqueado"
	                selectRol.style.cursor = "not-allowed"; 
	                
	                // Impedimos que el usuario abra el desplegable
	                selectRol.onmousedown = (e) => e.preventDefault();
	                selectRol.onkeydown = (e) => e.preventDefault();
	
	            }
            }

            form.onsubmit = async (e) => {
                e.preventDefault();
                if (!validarFormularioUsuarios()) return;
                const formData = new FormData(form);
                const accion = id ? "editar" : "crear";

                try {
                    const res = await fetch(`Usuario_Sv?accion=${accion}`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await res.json();

                    if (data.resultado === "OK") {
                        mostrarMensaje(data.mensaje, "success");
                        setTimeout(() => {
                            window.location.href = "admin?vista=usuarios";
                        }, 1500);
                    } else {
                        setError("Error: " + data.mensaje);
                    }
                } catch (err) {
                    setError("Error de conexión al guardar el usuario");
                }
            };
        });

        async function cargarDatosUsuario(id) {
            try {
                const res = await fetch(`Usuario_Sv?accion=detalle&id=${id}`);
                const u = await res.json();

                if (u) {
                    document.getElementById("usuario").value = u.usuario || "";
                    document.getElementById("email").value = u.email || "";
                    document.getElementById("nombre").value = u.nombre || "";
                    document.getElementById("apellidos").value = u.apellidos || "";
                    document.getElementById("telefono").value = u.telefono || "";
                    document.getElementById("direccion").value = u.direccion || "";
                    document.getElementById("rol").value = u.rol || "";
                    document.getElementById("foto_actual").value = u.foto || "";
                    
                    if (u.foto && u.foto !== "sin-foto.png") {
                        document.getElementById("previsualizacion").innerHTML = 
                            `<img src="img/${u.foto}" style="max-width: 150px; margin-bottom: 10px; border-radius: 5px; display: block;">`;
                    }
                }
            } catch (err) {
                console.error("Error cargando datos del usuario", err);
                setError("No se pudieron cargar los datos del usuario");
            }
        }
    </script>
</body>
</html>
