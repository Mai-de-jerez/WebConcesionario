<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Vehículos - Concesionario May</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">

	<div id="modalConfirmar" class="modal-simple" style="display:none;">
	    <div class="modal-contenido">
	        <h3>⚠️ ¿Eliminar vehículo?</h3>
	        <p>Esta acción no se puede deshacer.</p>
	        <div class="modal-btns">
	            <button id="btnConfirmarBorrar" class="btn btn-danger">Sí, borrar</button>
	            <button onclick="cerrarModal()" class="btn btn-secondary">Cancelar</button>
	        </div>
	    </div>
	</div>
	
    <div class="header-actions">
        <h1>🚗 Lista de Vehículos</h1>
        <div id="notificacion" class="message" style="display:none"></div>
        <a href="admin?vista=form-vehiculo" class="btn btn-success">➕ Nuevo Vehículo</a>
    </div>
	
	
    <div class="search-form">
        <input type="text" id="inputBusqueda" placeholder="Marca, modelo, matrícula...">
        <button id="btnLimpiar" class="btn btn-secondary" style="display:none">Limpiar</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Matrícula</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Año</th>
                    <th>Color</th>
                    <th>KM</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                </tbody>
        </table>
    </div>

    <div class="paginacion-container">
                <button type="button" id="pag-anterior" class="btn-ver">Anterior</button>
                <span id="num-pagina">Página 1</span>
                <button type="button" id="pag-siguiente" class="btn-ver">Siguiente</button>
            </div>

    <div class="nav-buttons">
        <a href="admin?vista=panel" class="btn btn-back">Volver al Panel</a>
    </div>
</div>
<script src="js/utils.js"></script> 
<script type="text/javascript">

	let estado = {
	pagina: 1,
	busqueda: ""
	};
	
	let idSeleccionadoParaBorrar = null;
	
	document.addEventListener("DOMContentLoaded", () => {
		
	    const estadoGuardado = sessionStorage.getItem("estado_gestion_coches");
	    if (estadoGuardado) {
	        const recuperado = JSON.parse(estadoGuardado);
	        estado.pagina = recuperado.pagina;
	        estado.busqueda = recuperado.busqueda;

	        document.getElementById("inputBusqueda").value = estado.busqueda;
	        if(estado.busqueda) {
	            document.getElementById("btnLimpiar").style.display = "inline-block";
	        }
	    }
	    
	    cargarCoches();

	    const tabla = document.getElementById("cuerpoTabla");
	    tabla.addEventListener("click", (e) => {
	        const link = e.target.closest(".link-borrar");
	        if (link) {
	            e.preventDefault(); 
	            const id = link.getAttribute("data-id");
	            abrirModalBorrado(id);
	        }
	    });

	    document.getElementById("btnConfirmarBorrar").onclick = ejecutarEliminacion;

	    let timer;
	    document.getElementById("inputBusqueda").addEventListener("input", (e) => {
	        clearTimeout(timer);
	        estado.busqueda = e.target.value;
	        estado.pagina = 1;
	        document.getElementById("btnLimpiar").style.display = estado.busqueda ? "inline-block" : "none";
	        sessionStorage.setItem("estado_gestion_coches", JSON.stringify(estado));
	        timer = setTimeout(cargarCoches, 400);
	    });

	    document.getElementById("btnLimpiar").onclick = () => {
	        document.getElementById("inputBusqueda").value = "";
	        estado.busqueda = "";
	        estado.pagina = 1;
	        document.getElementById("btnLimpiar").style.display = "none";
	        sessionStorage.setItem("estado_gestion_coches", JSON.stringify(estado));
	        cargarCoches();
	    };
	});


	async function cargarCoches() {
	    setLoading(8); 
	    try {
	        const res = await fetch(`Coche_Sv?accion=listar&pagina=${estado.pagina}&busqueda=${encodeURIComponent(estado.busqueda)}`);
	   
	        if (res.status === 401 || res.status === 403) {
	            window.location.href = "login.html";
	            return;
	        }

	        const data = await res.json();
	
	        if (!data.coches || data.coches.length === 0) {
	            setVacio("No hay coches con ese filtro", 8); 
	            renderPaginacion(0);
	            return;
	        }

	        renderTabla(data.coches);
	        renderPaginacion(data.totalPaginas);
	        sessionStorage.setItem("estado_gestion_coches", JSON.stringify(estado));
	        
	    } catch (err) {
	        setError("Error al conectar con el servidor");
	    }
	}


	function renderTabla(coches) {

		const tbody = document.getElementById("cuerpoTabla");
	    tbody.innerHTML = coches.map(c => `
	        <tr>
	            <td style="font-weight: bold; color: #764ba2;">${c.id}</td>
	            <td><strong>${c.matricula}</strong></td>
	            <td>${c.marca}</td>
	            <td>${c.modelo}</td>
	            <td>${c.anio}</td>
	            <td>${c.color || '-'}</td>
	            <td>${c.km.toLocaleString()}</td>
	            <td class="actions">
		            <a href="admin?vista=detalle-coche&id=${c.id}" class="row-btn btn-success btn-small">Ver más</a>
		            <a href="admin?vista=form-vehiculo&id=${c.id}" class="row-btn btn-primary btn-small">Editar</a>
		            <a href="#" class="row-btn btn-secondary btn-small link-borrar" data-id="${c.id}">Eliminar</a>
	            </td>
	        </tr>
	    `).join("");
	}
	
	function renderPaginacion(total) {
	    const btnAnt = document.getElementById("pag-anterior");
	    const btnSig = document.getElementById("pag-siguiente");
	    const info = document.getElementById("num-pagina");

	    if (!info || !btnAnt || !btnSig) return;

	    // Si solo hay una página, ocultamos el contenedor
	    const container = document.querySelector(".paginacion-container");
	    container.style.display = (total <= 1) ? "none" : "flex";

	    // Actualizamos el texto de la página
	    info.textContent = `Página ${estado.pagina} de ${total || 1}`;

	    // Bloqueo de botones
	    btnAnt.disabled = (estado.pagina <= 1);
	    btnSig.disabled = (estado.pagina >= total || total === 0);

	    // Asignamos eventos limpios
	    btnAnt.onclick = () => { if(estado.pagina > 1) cambiarPagina(estado.pagina - 1); };
	    btnSig.onclick = () => { if(estado.pagina < total) cambiarPagina(estado.pagina + 1); };
	}

	function cambiarPagina(n) {
	    estado.pagina = n;
	    sessionStorage.setItem("estado_gestion_coches", JSON.stringify(estado));
	    cargarCoches();
	}
	
	// --- FUNCIONES DEL MODAL ---
	function abrirModalBorrado(id) {
	    idSeleccionadoParaBorrar = id;
	    document.getElementById('modalConfirmar').style.display = 'flex';
	}

	function cerrarModal() {
	    document.getElementById('modalConfirmar').style.display = 'none';
	    idSeleccionadoParaBorrar = null;
	}

	async function ejecutarEliminacion() {
	    if (!idSeleccionadoParaBorrar) return;

	    try {
	        const res = await fetch(`Coche_Sv?accion=eliminar&id=${idSeleccionadoParaBorrar}`, { method: 'GET' });
	        const data = await res.json();
	        
	        if (data.resultado === "OK") {
	            cerrarModal();
	            mostrarMensaje("Vehículo eliminado correctamente", "success");
	            cargarCoches(); 
	        } else {
	            setError("Error: " + data.mensaje);
	        }
	    } catch (err) {
	        setError("Error de red al intentar eliminar");
	    }
	}
	
	document.querySelector('a[href="admin?vista=panel"]').addEventListener("click", () => {
	    sessionStorage.removeItem("estado_gestion_coches");
	});
</script>
</body>
</html>
