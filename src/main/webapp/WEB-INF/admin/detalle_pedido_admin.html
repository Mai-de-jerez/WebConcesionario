<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Pedido</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-body">
    <main class="content-area">
        <div class="container" style="max-width: 900px;">
            <h2 style="color: #764ba2; margin-bottom: 20px;">
                📄 Detalle del Pedido #<span id="idPedido"></span>
            </h2>

            <div style="display: flex; flex-wrap: wrap; gap: 40px; align-items: start;">

                <!-- Imagen del coche -->
                <div style="flex: 1; min-width: 300px;">
                    <div class="feature-card" style="padding: 10px; cursor: default;">
                        <img id="imgCoche" src="img/sin-foto.png" alt="Imagen del vehículo"
                             style="width:100%; border-radius:15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); min-height: 200px; object-fit: cover;">
                        <p style="text-align: center; margin-top: 10px; color: #666; font-style: italic;">Vehículo asociado al pedido</p>
                    </div>
                </div>

                <!-- Datos del pedido -->
                <div style="flex: 1.2; min-width: 300px;">
                    <div class="table-container" style="margin: 0;">
                        <table style="font-size: 0.95em;">
                            <tbody>
                                <tr style="background-color: #f8f9fa;">
                                    <td><strong>Estado</strong></td>
                                    <td><span id="estado"></span></td>
                                </tr>
                                <tr><td colspan="2" style="background-color: #eee; height: 1px; padding: 0;"></td></tr>
                                <tr><td><strong>Email contacto</strong></td><td id="emailContacto"></td></tr>
                                <tr><td><strong>Cliente</strong></td><td id="nombreCliente"></td></tr>
                                <tr><td><strong>Teléfono</strong></td><td id="telefono"></td></tr>
                                <tr><td><strong>Vehículo</strong></td><td id="vehiculo"></td></tr>
                                <tr><td colspan="2" style="background-color: #eee; height: 1px; padding: 0;"></td></tr>
                                <tr><td><strong>Señal abonada</strong></td><td id="importeSenal" style="font-size: 1.2em; font-weight: bold; color: #764ba2;"></td></tr>
                                <tr><td><strong>Precio total coche</strong></td><td id="importeTotal"></td></tr>                                                    
                                <tr><td><strong>Importe Final Abonado</strong></td><td id="importeFinalAbonado"></td></tr>                              
                                <tr><td colspan="2" style="background-color: #eee; height: 1px; padding: 0;"></td></tr>
                                <tr><td><strong>Fecha Reserva</strong></td><td id="fechaReserva"></td></tr>
                                <tr><td><strong>Fecha Expiración</strong></td><td id="fechaExpiracion"></td></tr>
                                <tr><td><strong>Fecha Pago</strong></td><td id="fechaPago"></td></tr>
                                <tr><td><strong>ID Transacción</strong></td><td id="transaccionId" style="font-family: monospace; font-size: 0.85em;"></td></tr>
                                <tr><td><strong>Observaciones</strong></td><td id="observaciones" style="font-style: italic; color: #555;"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
            	</div>        
                <!-- Botones de accion -->
                <div class="form-buttons" style="display: flex; justify-content: center; align-items: center; gap: 20px; width: 100%; margin-top: 30px;">
                    <a href="admin?vista=pedidos" class="btn btn-back">⬅️ Volver a la Lista</a>
                    
                    <a href="#" id="linkCompletar" onclick="accion('completar'); return false;" 
				       class="btn btn-success" style="display: none;">✅ Completar Pago</a>
				
				    <a href="#" id="linkCancelar" onclick="accion('cancelar'); return false;" 
				       class="btn btn-secondary" style="display: none;">❌ Cancelar Pedido</a>
                </div>            
        	</div>
        	</div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        document.addEventListener("DOMContentLoaded", () => {
            cargarDetalle();
            
        });

        async function cargarDetalle() {
            try {
                const res = await fetch(`Pedido_Sv?accion=detalle&id=${id}`);
                const p = await res.json();

                document.getElementById("idPedido").textContent = p.id;
                document.getElementById("imgCoche").src = `img/${p.coche?.imagen || "sin-foto.png"}`;
                document.getElementById("vehiculo").textContent = `${p.coche?.marca} ${p.coche?.modelo}`;
                document.getElementById("emailContacto").textContent = p.emailContacto || "---";
                document.getElementById("nombreCliente").textContent = p.usuario
                    ? `${p.usuario.nombre} ${p.usuario.apellidos}`
                    : "Sin cuenta registrada";
                document.getElementById("telefono").textContent = p.usuario?.telefono || "No facilitado";
                document.getElementById("importeSenal").textContent = `${p.importeSenal?.toFixed(2)} €`;
                document.getElementById("importeTotal").textContent = `${p.importeTotal?.toFixed(2)} €`;
                document.getElementById("importeFinalAbonado").textContent = `${p.importeFinalAbonado?.toFixed(2)} €`;
                document.getElementById("fechaReserva").textContent = formatFecha(p.fechaReserva);
                document.getElementById("fechaExpiracion").textContent = formatFecha(p.fechaExpiracion);
                document.getElementById("fechaPago").textContent = p.fechaPago ? formatFecha(p.fechaPago) : "---";
                document.getElementById("transaccionId").textContent = p.transaccionId || "N/A";
                document.getElementById("observaciones").textContent = p.observaciones || "Sin notas adicionales.";

                // Estado con color
                const estadoEl = document.getElementById("estado");
                estadoEl.textContent = p.estado;
               
             	// Definimos el color según tu lista de pedidos
                let estiloEstado = "color: #ffc107;"; // Por defecto PENDIENTE (Amarillo)
                if (p.estado === 'CANCELADO') estiloEstado = "color: #FF0000;"; // Rojo
                if (p.estado === 'EXPIRADO') estiloEstado = "color: #800000;";  // Granate
                if (p.estado === 'ABONADO') estiloEstado = "color: #28a745;";   // Verde

                // Aplicamos el estilo directamente al elemento
                estadoEl.style = estiloEstado + " font-weight: bold;";

                // Mostrar acciones solo si PENDIENTE
                if (p.estado === "PENDIENTE") {
                    document.getElementById("linkCompletar").style.display = "inline-block";
                    document.getElementById("linkCancelar").style.display = "inline-block";
                }

            } catch (e) {
                console.error("Error cargando detalle", e);
            }
        }
        
        
        async function accion(tipo) {
            if(!confirm(`¿Seguro que quieres ejecutar la acción: ${tipo}?`)) return;

            let body = `accion=${tipo}&id=${id}`;

            try {
                const res = await fetch("Pedido_Sv", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: body 
                });
                const data = await res.json();
                if (data.resultado === "OK") {
                    alert(data.mensaje);
                    cargarDetalle(); 
                } else {
                    alert("Error: " + data.mensaje);
                }
            } catch (e) {
                alert("Error inesperado en el servidor");
            }
        }
 
        function formatFecha(fecha) {
            if (!fecha) return "---";
            return new Date(fecha).toLocaleString("es-ES");
        }

    </script>
</body>
</html>
