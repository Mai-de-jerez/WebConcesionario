<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Vehículo - Sistema de Gestión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 id="tituloPagina">➕ Alta de Vehículo (Turismo)</h1>
		<div id="notificacion" class="message" style="display:none"></div>
        <form id="formVehiculo" action="AltaVehiculo" method="post" enctype="multipart/form-data" novalidate>
            
            <input type="hidden" id="idCoche" name="id">
            <input type="hidden" id="imagen_actual" name="imagen_actual">

		    <div class="form-grid">
		        <div class="form-group">
		            <label for="matricula">Matrícula: *</label>
		            <input type="text" id="matricula" name="matricula" required placeholder="Ej: 1234ABC">
		            <span id="error-matricula" class="mensaje-error-campo"></span> 
		        </div>
		
		        <div class="form-group">
		            <label for="marca">Marca: *</label>
		            <input type="text" id="marca" name="marca" required placeholder="Ej: Toyota">
		            <span id="error-marca" class="mensaje-error-campo"></span> 
		        </div>
		
		        <div class="form-group">
		            <label for="modelo">Modelo: *</label>
		            <input type="text" id="modelo" name="modelo" required placeholder="Ej: Corolla">
		            <span id="error-modelo" class="mensaje-error-campo"></span> 
		        </div>
		
		        <div class="form-group">
		            <label for="color">Color:</label>
		            <input type="text" id="color" name="color" placeholder="Ej: Blanco">
		            <span id="error-color" class="mensaje-error-campo"></span> 
		        </div>
		
		        <div class="form-group">
		            <label for="precio">Precio (€): *</label>
		            <input type="number" step="0.01" id="precio" name="precio" required placeholder="15000.50">
		            <span id="error-precio" class="mensaje-error-campo"></span>
		        </div>
		
		        <div class="form-group">
		            <label for="km">Kilómetros: *</label>
		            <input type="number" id="km" name="km" required placeholder="Ej: 50000">
		            <span id="error-km" class="mensaje-error-campo"></span>
		        </div>
		
		        <div class="form-group">
		            <label for="anio">Año:</label>
		            <input type="text" id="anio" name="anio" placeholder="Ej: 2023">
		            <span id="error-anio" class="mensaje-error-campo"></span>
		        </div>

		        
		        <div class="form-group">
				    <label for="tipoMotor">Tipo de Motor: *</label>
				    <select id="tipoMotor" name="tipoMotor" required>
				    	<option value="">-- Selecciona Motor --</option>
					    <option value="DIESEL">Diesel</option>
					    <option value="ELECTRICO">Electrico</option>
					    <option value="HIBRIDO">Hibrido</option>				    
					    <option value="GASOLINA">Gasolina</option>
					</select>
					<span id="error-tipoMotor" class="mensaje-error-campo"></span>
				</div>
		
		        <div class="form-group">
		            <label for="numPuertas">Número de Puertas:</label>
		            <select id="numPuertas" name="numPuertas">
		                <option value="">-- Selecciona Puertas --</option> 
		                <option value="3">3 puertas</option>
		                <option value="4">4 puertas</option>
		                <option value="5">5 puertas</option>
		            </select>
		            <span id="error-numPuertas" class="mensaje-error-campo"></span>
		        </div>
		 
		        <div class="form-group">
				    <label for="estado">Estado:</label>
				    <select id="estado" name="estado">
				        <option value="">-- Selecciona Estado --</option>
                        <option value="DISPONIBLE">Disponible</option>
				        <option value="RESERVADO">Reservado</option>
				        <option value="VENDIDO">Vendido</option>
				    </select>
				    <span id="error-estado" class="mensaje-error-campo"></span>
				</div>
				
							
		    </div>
		    <div class="form-group">
			    <label for="imagen">Foto del vehículo:</label>
                <div id="previsualizacion"></div>
			    <input type="file" id="imagen" name="imagen" accept="image/*" style="display: block; width: 100%;">
			    <span id="error-imagen" class="mensaje-error-campo"></span>
			    <small style="color: gray;">Formatos aceptados: JPG, PNG, WEBP</small>
			</div>
		    
		    <div class="form-group">
			    <label for="descripcion">Descripción: *</label>
			    <input type="text" id="descripcion" name="descripcion" required placeholder="Ej: El mejor coche... "> 
			    <span id="error-descripcion" class="mensaje-error-campo"></span>
			</div>
			
		    <div class="form-buttons">
		        <button type="submit" class="btn btn-success">💾 Guardar Vehículo</button>
                <button type="reset" class="btn btn-secondary">🔄 Limpiar </button>
                <a href="admin?vista=coches" class="btn btn-back">❌ Cancelar</a>
		    </div>
		    
		</form>
    </div> 
	<script src="js/utils.js"></script>
	<script src="js/validaciones.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
        	
        	configurarLimpiezaErrores("#formVehiculo");
        	
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            const form = document.getElementById("formVehiculo");

            if (id) {
                const titulo = document.getElementById("tituloPagina");
                if(titulo) titulo.innerText = "✏️ Editar Vehículo";
                
                const inputId = document.getElementById("idCoche");
                if(inputId) inputId.value = id;
                
                await cargarDatosCoche(id);
            }

            form.onsubmit = async (e) => {
                e.preventDefault();
                
                if (!validarFormularioCoche()) {
                    return; 
                }
                const formData = new FormData(form);
                const accion = id ? "editar" : "alta";
                
                try {
                    const res = await fetch(`Coche_Sv?accion=${accion}`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await res.json();
                    
                    if (data.resultado === "OK") {
                        mostrarMensaje(data.mensaje, "success");
                        setTimeout(() => {
                            window.location.href = "admin?vista=coches";
                        }, 1500);
                    } else {
                        setError("Error: " + data.mensaje);
                    }
                } catch (err) {
                    setError("Error de conexión al guardar el vehículo");
                }
            };
        });

        async function cargarDatosCoche(id) {
            try {
                const res = await fetch(`Coche_Sv?accion=detalle&id=${id}`);
                const c = await res.json();

                if (c) {
                    document.getElementById("matricula").value = c.matricula || "";
                    document.getElementById("marca").value = c.marca || "";
                    document.getElementById("modelo").value = c.modelo || "";
                    document.getElementById("color").value = c.color || "";
                    document.getElementById("precio").value = c.precio || "";
                    document.getElementById("km").value = c.km || "";
                    document.getElementById("anio").value = c.anio || "";
                    document.getElementById("tipoMotor").value = c.tipoMotor || "GASOLINA";
                    document.getElementById("numPuertas").value = c.numPuertas || "4";
                    document.getElementById("estado").value = c.estado || "DISPONIBLE";
                    document.getElementById("descripcion").value = c.descripcion || "";
                    document.getElementById("imagen_actual").value = c.imagen || "";

                    if (c.imagen) {
                        document.getElementById("previsualizacion").innerHTML = 
                            `<img src="img/${c.imagen}" style="max-width: 150px; margin-bottom: 10px; border-radius: 5px; display: block;">`;
                    }
                }
           
	        } catch (err) {
	            console.error("Error cargando datos del coche", err);
	            setError("No se pudieron cargar los datos del vehículo");
	        }
        }
    </script>
</body>
</html>
