<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de la Reserva</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-body">
    <main class="content-area">
        <div class="container" style="max-width: 900px;">
            <h2 style="color: #764ba2; margin-bottom: 20px;">
                📄 Detalle de la Reserva #<span id="idPedido"></span>
            </h2>

            <div style="display: flex; flex-wrap: wrap; gap: 40px; align-items: start;">

                <!-- Imagen del coche -->
                <div style="flex: 1; min-width: 300px;">
                    <div class="feature-card" style="padding: 10px; cursor: default;">
                        <img id="imgCoche" src="img/sin-foto.png" alt="Imagen del vehículo"
                             style="width:100%; border-radius:15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); min-height: 200px; object-fit: cover;">
                        <p style="text-align: center; margin-top: 10px; color: #666; font-style: italic;">Vehículo asociado a la Reserva</p>
                    </div>
                </div>

                <!-- Datos del pedido -->
                <div style="flex: 1.2; min-width: 300px;">
                    <div class="table-container" style="margin: 0;">
                        <table style="font-size: 0.95em;">
                            <tbody>
                                <tr style="background-color: #f8f9fa;">
                                    <td><strong>Estado</strong></td>
                                    <td><span id="estado"></span></td>
                                </tr>
                                <tr><td colspan="2" style="background-color: #eee; height: 1px; padding: 0;"></td></tr>
                                <tr><td><strong>ID Usuario</strong></td><td id="idUsuario"></td></tr>
								<tr><td><strong>ID Coche</strong></td><td id="idCoche"></td></tr>
                                <tr><td><strong>Email contacto</strong></td><td id="emailContacto"></td></tr>
                                <tr><td><strong>Cliente</strong></td><td id="nombreCliente"></td></tr>
                                <tr><td><strong>Teléfono</strong></td><td id="telefono"></td></tr>
                                <tr><td><strong>Vehículo</strong></td><td id="vehiculo"></td></tr>
                                <tr><td><strong>Método de Pago</strong></td><td id="metodoPago"></td></tr>
                                <tr><td colspan="2" style="background-color: #eee; height: 1px; padding: 0;"></td></tr>
                                <tr><td><strong>Importe abonado</strong></td><td id="importeSenal" style="font-size: 1.2em; font-weight: bold; color: #764ba2;"></td></tr>                                                                                  
                                <tr><td colspan="2" style="background-color: #eee; height: 1px; padding: 0;"></td></tr>
                                <tr><td><strong>Fecha Reserva</strong></td><td id="fechaReserva"></td></tr>
                                <tr><td><strong>Fecha Expiración</strong></td><td id="fechaExpiracion"></td></tr>                        
                                <tr><td><strong>ID Transacción</strong></td><td id="transaccionId" style="font-family: monospace; font-size: 0.85em;"></td></tr>
                                <tr><td><strong>Observaciones</strong></td><td id="observaciones" style="font-style: italic; color: #555;"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
            	</div>        
                <!-- Botones de accion -->
                <div class="form-buttons" style="display: flex; justify-content: center; align-items: center; gap: 20px; width: 100%; margin-top: 30px;">
                    <a href="admin?vista=reservas" class="btn btn-back">⬅️ Volver a la Lista</a>
                    
                    <a href="#" id="linkCompletar" onclick="accion('completar'); return false;" 
				       class="btn btn-success" style="display: none;">✅ Completar Pago</a>
				
				    <a href="#" id="linkCancelar" onclick="accion('cancelar'); return false;" 
				       class="btn btn-secondary" style="display: none;">❌ Cancelar Reserva</a>
				       
				    <a href="#" id="linkEliminar" onclick="accion('eliminar'); return false;" 
				       class="btn btn-secondary" style="display: none;">❌ Eliminar Reserva</a>
                </div>            
        	</div>
        	</div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        document.addEventListener("DOMContentLoaded", () => {
            cargarDetalle();
            
        });

        async function cargarDetalle() {
            try {
            	const resLogin = await fetch("Login"); // visitamos mi login servlet
                const usuario = await resLogin.json(); // obtenemos el usuario logueado
                const nivel = usuario.nivel; // obtenemos su nivel de acceso para luego
                const res = await fetch(`Reserva_Sv?accion=detalle&id=${id}`); // hacemos la consulta 
                // al servlet de reservas para obtener el detalle de la reserva
                const p = await res.json(); // obtenemos el objeto reserva con toda su información

                // Rellenamos los campos con la información obtenida
                document.getElementById("idPedido").textContent = p.id;
                document.getElementById("imgCoche").src = `img/${p.coche?.imagen || "sin-foto.png"}`;
                document.getElementById("vehiculo").textContent = `${p.coche?.marca} ${p.coche?.modelo}`;
                document.getElementById("emailContacto").textContent = p.usuario ? p.usuario.email : "Sin email";
                document.getElementById("nombreCliente").textContent = p.usuario
                    ? `${p.usuario.nombre} ${p.usuario.apellidos}`
                    : "Sin cuenta registrada";
                document.getElementById("idUsuario").textContent = p.usuario ? `${p.usuario.id_usuario}` : "N/A";
                document.getElementById("idCoche").textContent = p.coche ? `${p.coche.id}` : "N/A";
                document.getElementById("metodoPago").textContent = p.metodoPago || "No especificado";
                document.getElementById("telefono").textContent = p.usuario?.telefono || "No facilitado";
                document.getElementById("importeSenal").textContent = `${p.venta.importeAbonado?.toFixed(2)} €`;
                document.getElementById("fechaReserva").textContent = formatFecha(p.fechaReserva);
                document.getElementById("fechaExpiracion").textContent = formatFecha(p.fechaExpiracion);
                document.getElementById("transaccionId").textContent = p.transaccionId || "N/A";
                document.getElementById("observaciones").textContent = p.observaciones || "Sin notas adicionales.";

                // Estado con color
                const estadoEl = document.getElementById("estado");
                estadoEl.textContent = p.estado;
               
             	// Definimos el color según el estado de la reserva
                let estiloEstado = "color: #ffc107;"; // amarillo por defecto para PENDIENTE
                if (p.estado === 'CANCELADA') estiloEstado = "color: #FF0000;"; // Rojo
                if (p.estado === 'EXPIRADA') estiloEstado = "color: #800000;";  // Granate
                if (p.estado === 'FINALIZADA') estiloEstado = "color: #28a745;";   // Verde

                // Aplicamos el estilo directamente al elemento
                estadoEl.style = estiloEstado + " font-weight: bold;";

                // Mostrar acciones solo si reserva esta activa                
                if (p.estado === "ACTIVA") {
                    // Ambos ven completar si está activa
                    document.getElementById("linkCompletar").style.display = "inline-block";                   
                    // cancelar para nivel 2
                    if (nivel === 2) {
                        document.getElementById("linkCancelar").style.display = "inline-block";
                    }
                }

                // eliminar para superuser
                if (nivel === 1) {
                    document.getElementById("linkEliminar").style.display = "inline-block";
                }
                
            } catch (e) {
                console.error("Error cargando detalle", e);
            }
        }
        
        
        async function accion(tipo) {
            if(!confirm(`¿Seguro que quieres ejecutar la acción: ${tipo}?`)) return;

            let body = `accion=${tipo}&id=${id}`;

            try {
                const res = await fetch("Reserva_Sv", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: body 
                });
                const data = await res.json();
                if (data.resultado === "OK") {
                    alert(data.mensaje);
                    cargarDetalle(); 
                } else {
                    alert("Error: " + data.mensaje);
                }
            } catch (e) {
                alert("Error inesperado en el servidor");
            }
        }
 
        function formatFecha(fecha) {
            if (!fecha) return "---";
            return new Date(fecha).toLocaleString("es-ES");
        }
        

    </script>
</body>
</html>
