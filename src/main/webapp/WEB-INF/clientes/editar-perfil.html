<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Mi Perfil | May Cars</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-body">
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="tienda.html" class="nav-link">Tienda</a>
            <a href="sobre-nosotros.html" class="nav-link">Sobre Nosotros</a>
            <a href="contacto.html" class="nav-link">Contacto</a>
        </div>
        <div class="nav-right" id="nav-sesion"></div>        
    </nav>

    <div class="container" style="max-width: 800px; margin-top: 30px;">
        <h1 id="tituloPagina" style="color: #764ba2;">✏️ Editar Mi Perfil</h1>
        
        <div id="notificacion" class="message" style="display:none; padding: 15px; border-radius: 8px; margin-bottom: 20px;"></div>
        
        <form id="formEditarPerfil" enctype="multipart/form-data" class="feature-card" style="padding: 30px; background: white; cursor: default;">
            <input type="hidden" name="accion" value="editar_mi_perfil">
            <input type="hidden" id="foto_actual" name="foto_actual">

            <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                
                <div class="form-group">
                    <label for="usuario">Nombre de Usuario: *</label>
                    <input type="text" id="usuario" name="usuario" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico: *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre">
                </div>

                <div class="form-group">
                    <label for="apellidos">Apellidos:</label>
                    <input type="text" id="apellidos" name="apellidos">
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección:</label>
                    <input type="text" id="direccion" name="direccion">
                </div>

                <div class="form-group" style="grid-column: span 2;">
                    <label for="password">Contraseña (dejar en blanco para no cambiar):</label>
                    <input type="password" id="password" name="password" autocomplete="new-password" placeholder="Nueva contraseña opcional">
                </div>
            </div>
            
            <div class="form-group" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
			    <label for="foto">Foto de perfil:</label>
			    <div id="previsualizacion" style="margin-bottom: 10px;"></div>
			    <input type="file" id="foto" name="foto" accept="image/*" class="form-control">
			</div>

            <div class="form-buttons" style="margin-top: 30px; display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary" style="background: #764ba2;">💾 Guardar Cambios</button>
                <a href="perfil.html" class="btn btn-back">❌ Cancelar</a>
            </div>
        </form>
    </div>

    <script src="js/nav-session.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await cargarDatosActuales();

            const form = document.getElementById("formEditarPerfil");

            form.onsubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(form);

                try {
                    const res = await fetch('Cliente_Sv', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await res.json();

                    const notif = document.getElementById("notificacion");
                    notif.style.display = "block";
                    
                    if (data.resultado === "OK") {
                        notif.textContent = data.mensaje;
                        notif.style.background = "#d4edda";
                        notif.style.color = "#155724";
                        setTimeout(() => { window.location.href = "perfil.html"; }, 1500);
                    } else {
                        notif.textContent = "Error: " + data.mensaje;
                        notif.style.background = "#f8d7da";
                        notif.style.color = "#721c24";
                    }
                } catch (err) {
                    console.error(err);
                }
            };
        });

        async function cargarDatosActuales() {
            try {
                // Usamos la misma acción que en la vista de perfil
                const res = await fetch('Cliente_Sv?accion=perfil');
                const u = await res.json();

                if (u) {
                    document.getElementById("usuario").value = u.usuario || "";
                    document.getElementById("email").value = u.email || "";
                    document.getElementById("nombre").value = u.nombre || "";
                    document.getElementById("apellidos").value = u.apellidos || "";
                    document.getElementById("telefono").value = u.telefono || "";
                    document.getElementById("direccion").value = u.direccion || "";
                    document.getElementById("foto_actual").value = u.foto || "";
                    
                    if (u.foto && u.foto !== "sin-foto.png") {
                        document.getElementById("previsualizacion").innerHTML = 
                            `<img src="img/${u.foto}" style="max-width: 100px; border-radius: 50%; aspect-ratio: 1/1; object-fit: cover; border: 2px solid #764ba2;">`;
                    }
                }
            } catch (err) {
                console.error("Error cargando datos", err);
            }
        }
    </script>
</body>
</html>
