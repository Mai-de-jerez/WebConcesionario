<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Vehículo | Concesionario May</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-body">
    <main class="content-area">
        <div class="container" style="max-width: 900px;">
            <div id="wrapper-detalle" style="display: flex; flex-wrap: wrap; gap: 40px; align-items: start;">
                
                <div style="flex: 1; min-width: 300px;">
                    <div class="feature-card" style="padding: 10px; cursor: default;">
                        <img id="img-coche" src="img/sin-foto.png" alt="Coche" 
                             style="width:100%; border-radius:15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); min-height: 200px; object-fit: cover;">
                    </div>
                </div>

                <div style="flex: 1.2; min-width: 300px;">
                    <h1 style="font-size: 2.5em; display: flex; align-items: baseline; gap: 15px; flex-wrap: wrap;">
                        <span id="marca-txt" style="color: #764ba2;"></span>
                        <span id="modelo-txt" style="color: #333;"></span>
                    </h1>
                    
                    <div class="table-container" style="margin: 0;">
                        <table style="font-size: 0.95em;">
                            <tbody>
                                <tr id="fila-id" style="display: none;">
                                    <td><strong>ID Vehículo (Interno)</strong></td>
                                    <td id="val-id"></td>
                                </tr>
                                <tr><td><strong>Marca</strong></td><td id="val-marca"></td></tr>
                                <tr><td><strong>Modelo</strong></td><td id="val-modelo"></td></tr>
                                <tr><td><strong>Matrícula</strong></td><td id="val-matricula"></td></tr>
                                <tr><td><strong>Color</strong></td><td id="val-color"></td></tr>
                                <tr><td><strong>Precio</strong></td><td id="val-precio"></td></tr>
                                <tr><td><strong>Kilómetros</strong></td><td id="val-km"></td></tr>
                                <tr><td><strong>Año de fabricación</strong></td><td id="val-anio"></td></tr>
                                <tr><td><strong>Tipo de Motor</strong></td><td id="val-motor"></td></tr>
                                <tr><td><strong>Número de Puertas</strong></td><td id="val-puertas"></td></tr>
                                <tr><td><strong>Disponibilidad</strong></td><td><span id="val-estado"></span></td></tr>
                                <tr>
                                    <td><strong>Descripción</strong></td>
                                    <td id="val-desc"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="form-buttons" style="justify-content: flex-start; margin-top: 25px; gap: 10px; display: flex; flex-wrap: wrap;">
                        <a id="btn-editar" href="#" class="btn btn-primary" style="display: none;">✏️ Editar Vehículo</a>
                        <a id="btn-carrito" href="#" class="btn btn-success" style="display: none;">🛒 Añadir a la cesta</a>
                        <a id="btn-volver" href="Tienda" class="btn btn-back">Volver</a>
                    </div>                                 
                </div>
            </div>
        </div>
    </main>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const esAdmin = params.get("admin") === "true";

    if (!id) return;

    try {
        const res = await fetch(`Coche_Sv?accion=detalle&id=${id}`);
        const c = await res.json();

        // Inyectar datos en el HTML
        document.getElementById("img-coche").src = `img/${c.imagen || 'sin-foto.png'}`;
        document.getElementById("marca-txt").textContent = c.marca;
        document.getElementById("modelo-txt").textContent = c.modelo;

        // Rellenar celdas de la tabla
        document.getElementById("val-marca").textContent = c.marca;
        document.getElementById("val-modelo").textContent = c.modelo;
        document.getElementById("val-matricula").textContent = c.matricula;
        document.getElementById("val-color").textContent = c.color || '-';
        document.getElementById("val-precio").textContent = `${c.precio.toLocaleString()} €`;
        document.getElementById("val-km").textContent = `${c.km.toLocaleString()} km`;
        document.getElementById("val-anio").textContent = c.anio;
        document.getElementById("val-motor").textContent = c.tipoMotor;
        document.getElementById("val-puertas").textContent = c.numPuertas || '5';
        document.getElementById("val-estado").textContent = c.estado;
        document.getElementById("val-desc").textContent = c.descripcion || "Sin descripción adicional disponible.";

        // Lógica de botones y campos extra para Admin
        if (esAdmin) {
            document.getElementById("fila-id").style.display = "table-row";
            document.getElementById("val-id").textContent = c.id;
            
            const btnEdit = document.getElementById("btn-editar");
            btnEdit.href = `form-vehiculo.html?id=${c.id}`;
            btnEdit.style.display = "inline-block";
            
            document.getElementById("btn-volver").href = "coche_admin.html";
            document.getElementById("btn-volver").textContent = "Volver al Panel";
        } else {
            const btnCarrito = document.getElementById("btn-carrito");
            btnCarrito.href = `Carrito?idCoche=${c.id}&precioCoche=${c.precio}`;
            btnCarrito.style.display = "inline-block";
        }

    } catch (err) {
        console.error("Error cargando el coche:", err);
    }
});
</script>
</body>
</html>
