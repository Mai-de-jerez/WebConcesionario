<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Concesionario May</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-body"> 
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="tienda.html" class="nav-link">Tienda</a>
            <a href="sobre-nosotros.html" class="nav-link">Sobre Nosotros</a>
            <a href="contacto.html" class="nav-link">Contacto</a>
        </div>
        <div class="nav-right" id="nav-sesion"></div>
    </nav>

    <main class="content-area">
        <div class="container" style="max-width: 1100px;">
            <h1>Contacto</h1>
            <div class="form-grid">
                <div class="linea_divisoria_vertical" style="padding: 20px; border-right: 1px solid #e1e8ed;">
                    <h2>Nuestros Datos</h2>
                    <div class="feature-cards" style="grid-template-columns: 1fr; margin: 0;">
                        <h3>📍 Dirección</h3>
                        <p>Calle del Motor, 45 (28045 Madrid)</p>
                        <h3>📞 Teléfono</h3>
                        <p>910 00 00 00 - 600 00 00 00</p>
                        <h3>⏰ Horario</h3>
                        <p>L-V: 09:00 a 20:00 - S: 10:00 a 14:00</p>                      
                    </div>
                </div>

                <div>
                    <h2>Envíanos un mensaje</h2>
                    <div id="feedback-msj"></div>
                    <form id="formContacto">
                        <div class="form-group">
                            <label>Nombre Completo:</label>
                            <input type="text" id="contactoNombre" name="nombre" required placeholder="Tu nombre">
                        </div>
                        <div class="form-group">
                            <label>Email:</label>
                            <input type="email" id="contactoEmail" name="email" required placeholder="tu@email.com">
                        </div>
                        <div class="form-group">
                            <label>Mensaje:</label>
                            <textarea id="contactoMensaje" name="mensaje" rows="6" style="width: 100%; padding: 12px 15px; border: 2px solid #e1e8ed; border-radius: 8px; font-size: 1em; font-family: inherit;" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Enviar Consulta</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Concesionario May. Todos los derechos reservados.</p>
    </footer>

    <script src="js/nav-session.js"></script>
    <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", async () => {
        const form = document.getElementById("formContacto");
        const inputNombre = document.getElementById("contactoNombre");
        const inputEmail = document.getElementById("contactoEmail");
        const feedback = document.getElementById("feedback-msj");

        // --- 1. LÓGICA DE AUTORELLENADO (Preguntamos al Servlet de Login) ---
        try {
            const resSesion = await fetch('Login', {
                headers: { 'Accept': 'application/json' }
            });
            
            if (resSesion.ok) {
                const datos = await resSesion.json();
                
                // Si el servidor nos devuelve datos, rellenamos y aplicamos estilos
                if (datos.nombre && datos.email) {
                    inputNombre.value = datos.nombre;
                    inputEmail.value = datos.email;
                    
                    // Bloqueamos para que no se puedan editar
                    inputNombre.readOnly = true;
                    inputEmail.readOnly = true;
                    
                    // Aplicamos el estilo gris directamente por JS para no tocar CSS
                    [inputNombre, inputEmail].forEach(el => {
                        el.style.backgroundColor = "#e9ecef";
                        el.style.color = "#495057";
                        el.style.cursor = "not-allowed";
                    });
                }
            }
        } catch (err) {
            console.error("Error al recuperar sesión para el formulario", err);
        }
       
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // IMPORTANTE: Cogemos los valores directamente de los inputs
            const nombreVal = inputNombre.value;
            const emailVal = inputEmail.value;
            const mensajeVal = document.getElementById("contactoMensaje").value;

            // Metemos los datos en un objeto para el fetch
            const params = new URLSearchParams();
            params.append("nombre", nombreVal);
            params.append("email", emailVal);
            params.append("mensaje", mensajeVal);

            try {
                
                const res = await fetch('EnviarMensaje', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: params
                });

                if (res.ok) {
                    const data = await res.json();
                    feedback.innerHTML = `<div style="color: green; padding: 10px; background: #d4edda;">✅ ${data.mensaje}</div>`;
                    
                    // Si es invitado, limpiamos todo. Si no, solo el mensaje.
                    if (!inputNombre.readOnly) form.reset();
                    else document.getElementById("contactoMensaje").value = "";
                } else {
                    feedback.innerHTML = `<div style="color: red; padding: 10px; background: #f8d7da;">❌ Error en el servidor.</div>`;
                }
            } catch (err) {
                feedback.innerHTML = `<div style="color: red; padding: 10px; background: #f8d7da;">❌ Error de conexión.</div>`;
            }
        };
    });
    </script>
</body>
</html>
