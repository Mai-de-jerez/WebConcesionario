<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda | Concesionario May</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-body">

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="tienda.html" class="nav-link">Tienda</a>
            <a href="sobre-nosotros.html" class="nav-link">Sobre Nosotros</a>
            <a href="contacto.html" class="nav-link">Contacto</a>
        </div>
        
        <div class="nav-right" id="nav-sesion">
            <span class="nav-link">Cargando...</span>
        </div>
    </nav>

    <main class="content-area">
        <div class="container">
            <h1>🚗 Unidades Disponibles</h1>

            
            <div class="feature-cards-shop" id="contenedor-coches">
                <p>Cargando vehículos...</p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Concesionario May. Todos los derechos reservados.</p>
    </footer>
	<script src="js/nav-session.js"></script>

    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", () => {
            cargarTienda();
        });

        async function cargarTienda() {
            try {
                // Solo necesitamos saber si hay alguien para el botón de compra
                const resUser = await fetch('Login');
                const usuario = resUser.ok ? await resUser.json() : null;

                // Cargamos los coches
                const resCoches = await fetch('Tienda');
                const data = await resCoches.json();
                
                renderCoches(data.coches, usuario);

            } catch (error) {
                console.error("Error cargando la tienda", error);
                document.getElementById("contenedor-coches").innerHTML = "<p>Error al conectar con el servidor.</p>";
            }
        }

        function renderCoches(coches, usu) {
            const contenedor = document.getElementById("contenedor-coches");
            
            if (!coches || coches.length === 0) {
                contenedor.innerHTML = "<p>No hay vehículos disponibles en este momento.</p>";
                return;
            }

            contenedor.innerHTML = coches.map(c => {
       
                const foto = c.imagen || c.foto || "sin-foto.png";
    
                let botonCompra = "";
                if (!usu || usu.resultado === "ERROR") {
                    botonCompra = `<a href="login.html?idRegreso=${c.id}" class="btn btn-secondary btn-small">🛒 Login para comprar</a>`;
                } else {
                    botonCompra = `<a href="Carrito?idCoche=${c.id}&precioCoche=${c.precio}" class="btn btn-success btn-small">🛒 Comprar</a>`;
                }

                return `
                    <div class="feature-card">
                        <img src="img/${foto}" alt="${c.modelo}" style="width:100%; border-radius:10px; height:180px; object-fit:cover; margin-bottom:15px;">                 
                        <h3>${c.marca} ${c.modelo}</h3>
                        <p>${c.tipoMotor} | ${c.km.toLocaleString()} km</p>
                        <p style="font-weight: bold; color: #764ba2; font-size: 1.3em; margin: 10px 0;">
                            ${c.precio.toLocaleString()} €
                        </p>
                        
                        
                        <div class="actions" style="display: flex; flex-direction: column; gap: 10px;">
                            <a href="detalle_coche_tienda.html?id=${c.id}" class="btn btn-secondary btn-small">Ver más</a>
                            ${botonCompra}
                        </div>
                    </div>
                `;
            }).join("");
  
        }
    </script>
</body>
</html>
