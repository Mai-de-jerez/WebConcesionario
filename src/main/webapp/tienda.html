<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda | Concesionario May</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="home-body">

    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="tienda.html" class="nav-link">Tienda</a>
            <a href="sobre-nosotros.html" class="nav-link">Sobre Nosotros</a>
            <a href="contacto.html" class="nav-link">Contacto</a>
        </div>
        
        <div class="nav-right" id="nav-sesion">
            <span class="nav-link">Cargando...</span>
        </div>
    </nav>

    <main class="content-area">
        <div class="container">
            <h1>🚗 Unidades Disponibles</h1>
			<div id="notificacion" class="message" style="display:none"></div>
			<div class="search-form">
                <input type="text" id="inputBusqueda" placeholder="Marca, modelo...">
                <button id="btnLimpiar" class="btn btn-secondary">Limpiar</button>
            </div>
            
            <div class="feature-cards-shop" id="contenedor-coches">
                <p>Cargando vehículos...</p>
            </div>
            
            
            <div class="paginacion-container" style="display:none;">
                <button type="button" id="pag-anterior" class="btn-ver">Anterior</button>
                <span id="num-pagina">Página 1</span>
                <button type="button" id="pag-siguiente" class="btn-ver">Siguiente</button>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Concesionario May. Todos los derechos reservados.</p>
    </footer>
	<script src="js/nav-session.js"></script> 
	<script src="js/utils.js"></script>  
    <script type="text/javascript">

        let estado = { pagina: 1, busqueda: "" };
        let usuarioActual = null;

        document.addEventListener("DOMContentLoaded", async () => {

            const resUser = await fetch('Login');
            usuarioActual = resUser.ok ? await resUser.json() : null;
            const estadoGuardado = sessionStorage.getItem("estado_tienda");
            
            if (estadoGuardado) {
                const recuperado = JSON.parse(estadoGuardado);
                estado.pagina = recuperado.pagina;
                estado.busqueda = recuperado.busqueda;
                document.getElementById("inputBusqueda").value = estado.busqueda;
            }
            
            cargarTienda();

            let timer;
            document.getElementById("inputBusqueda").addEventListener("input", (e) => {
                clearTimeout(timer);
                estado.busqueda = e.target.value;
                estado.pagina = 1;
                sessionStorage.setItem("estado_tienda", JSON.stringify(estado));
                timer = setTimeout(cargarTienda, 400);
            });

            document.getElementById("btnLimpiar").addEventListener("click", () => {
                document.getElementById("inputBusqueda").value = "";
                estado.busqueda = "";
                estado.pagina = 1;
                cargarTienda();
            });
        });

        async function cargarTienda() {
            try {
                const res = await fetch(`Tienda_Sv?accion=listar&busqueda=${encodeURIComponent(estado.busqueda)}&pagina=${estado.pagina}`);
                const data = await res.json();

                if (!data.coches || data.coches.length === 0) {
                    document.getElementById("contenedor-coches").innerHTML = "<p>No hay vehículos disponibles.</p>";
                    renderPaginacion(0);
                    return;
                }

                renderCoches(data.coches);
                renderPaginacion(data.totalPaginas);
                sessionStorage.setItem("estado_tienda", JSON.stringify(estado));

            } catch (error) {
                setError("Error al conectar con el servidor");
            }
        }

        function renderCoches(coches) {
            const contenedor = document.getElementById("contenedor-coches");

            contenedor.innerHTML = coches.map(c => {
                const foto = c.imagen || "sin-foto.png";

                return `
                    <div class="feature-card">
                        <img src="img/${foto}" alt="${c.modelo}" style="width:100%; border-radius:10px; height:180px; object-fit:cover; margin-bottom:15px;">
                        <h3>${c.marca} ${c.modelo}</h3>
                        <p>${c.tipoMotor} | ${c.km.toLocaleString()} km</p>
                        <p style="font-weight: bold; color: #764ba2; font-size: 1.3em; margin: 10px 0;">
                            ${c.precio.toLocaleString()} €
                        </p>
                        <div class="actions" style="display: flex; flex-direction: column; gap: 10px;">
                            <a href="detalle_coche_tienda.html?id=${c.id}" class="btn btn-secondary btn-small">Ver más</a>
                            <a href="clientes?vista=checkout&idCoche=${c.id}" class="btn btn-success btn-small">🛒 Reservar</a>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function renderPaginacion(total) {
            const btnAnt = document.getElementById("pag-anterior");
            const btnSig = document.getElementById("pag-siguiente");
            const info = document.getElementById("num-pagina");
            const container = document.querySelector(".paginacion-container");

            container.style.display = (total <= 1) ? "none" : "flex";
            info.textContent = `Página ${estado.pagina} de ${total || 1}`;
            btnAnt.disabled = (estado.pagina <= 1);
            btnSig.disabled = (estado.pagina >= total || total === 0);

            btnAnt.onclick = () => { if (estado.pagina > 1) cambiarPagina(estado.pagina - 1); };
            btnSig.onclick = () => { if (estado.pagina < total) cambiarPagina(estado.pagina + 1); };
        }

        function cambiarPagina(n) {
            estado.pagina = n;
            sessionStorage.setItem("estado_tienda", JSON.stringify(estado));
            cargarTienda();
        }
    </script>
</body>
</html>
